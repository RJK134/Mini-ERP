name: CI

on:
  push:
    branches: [main, "phase-*", "claude/**"]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opshub
          POSTGRES_PASSWORD: opshub
          POSTGRES_DB: opshub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U opshub"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://opshub:opshub@localhost:5432/opshub_test?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma validate
        run: pnpm --filter @ops-hub/db prisma:validate

      - name: Prisma generate
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
